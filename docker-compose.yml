services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: her_poc
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata_her:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d her_poc"]
      interval: 5s
      timeout: 5s
      retries: 5

  her-api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dev:dev@postgres:5432/her_poc
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./adapters:/app/adapters
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  pgdata_her:
